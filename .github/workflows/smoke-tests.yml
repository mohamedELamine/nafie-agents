name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ruff

      - name: Compile sources
        run: python -m compileall -q core agents supervisor

      - name: Run Ruff
        run: |
          ruff check core agents supervisor \
            --select E,F,W \
            --ignore E501,E402,F821,W291,W293,F841 \
            --per-file-ignores "__init__.py:F401"

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pydantic psycopg2-binary anthropic redis

      - name: Run analytics-agent tests
        working-directory: agents/analytics/analytics-agent
        run: python -m pytest tests/ -q

      - name: Run support-agent tests
        working-directory: agents/support/support-agent
        run: python -m pytest tests/ -q

      - name: Run marketing-agent tests
        working-directory: agents/marketing/marketing-agent
        run: python -m pytest tests/ -q

      - name: Run content-agent tests
        working-directory: agents/content/content-agent
        run: python -m pytest tests/ -q

      - name: Run visual_production-agent tests
        working-directory: agents/visual_production/visual-production-agent
        run: python -m pytest tests/ -q

      - name: Run platform-agent tests
        working-directory: agents/platform/platform-agent
        run: python -m pytest tests/ -q

  smoke-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: pip install -r requirements.txt psycopg2-binary pydantic-settings

      - name: Run smoke tests
        run: python scripts/run_smoke_tests.py
